services:
  - type: web
    name: flow-space-frontend
    env: static
    buildCommand: |
      git clone https://github.com/flutter/flutter.git -b stable --depth 1
      export PATH="$PATH:$(pwd)/flutter/bin"
      flutter pub get
      echo "Building with API_BASE_URL=https://flow-space.onrender.com/api/v1"
      flutter build web --dart-define=API_BASE_URL=https://flow-space.onrender.com/api/v1 --dart-define=DEBUG_MODE=false --no-wasm --verbose
    staticPublishPath: build/web
    envVars:
      - key: FLUTTER_WEB_CANVASKIT_URL
        value: https://cdn.jsdelivr.net/gh/flutter/canvaskit@master
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: Pragma
        value: no-cache
      - path: /*
        name: Expires
        value: 0
