services:
  - type: web
    name: flow-space-frontend
    env: static
    buildCommand: |
      git clone https://github.com/flutter/flutter.git -b stable --depth 1
      export PATH="$PATH:$(pwd)/flutter/bin"
      flutter pub get
      echo "Building with API_BASE_URL=https://flow-space.onrender.com/api/v1"
      echo "Build timestamp: $(date)"
      flutter build web --dart-define=API_BASE_URL=https://flow-space.onrender.com/api/v1 --dart-define=DEBUG_MODE=false --no-wasm --verbose --web-renderer canvaskit
    staticPublishPath: build/web
    envVars:
      - key: FLUTTER_WEB_CANVASKIT_URL
        value: https://cdn.jsdelivr.net/gh/flutter/canvaskit@master
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: Pragma
        value: no-cache
      - path: /*
        name: Expires
        value: 0
      - path: /*
        name: Build-Timestamp
        value: "$(date)"

  - type: web
    name: flow-space-backend
    env: node
    buildCommand: |
      echo "Running database migrations..."
      node migrations/run-all.js
    startCommand: |
      echo "Starting backend server..."
      node server.js
    envVars:
      - key: DB_CONNECTION_MODE
        value: external
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/v1/health
